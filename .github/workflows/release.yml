# GitHub Release on tag push. Runs `npm run verify` for sanity, then creates
# a release with auto-generated notes.
#
# npm publish is intentionally NOT in this workflow — manual `npm publish`
# from a maintainer's local is the established pattern (matches wisp-agentdiff).
# When CI-publish is wanted: add NPM_TOKEN as a repo secret and reintroduce a
# `npm publish --access public --provenance` step guarded by
# `if: ${{ secrets.NPM_TOKEN != '' && !contains(github.ref, '-') }}`.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + typecheck + test + build)
        run: npm run verify

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
