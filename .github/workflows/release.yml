name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Job-level env so step-level `if:` can read NODE_AUTH_TOKEN — step env
    # is not materialised until after `if:` evaluates, which silently
    # disables the publish step.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run verify

      - name: Publish to npm
        # Skip when:
        #   - tag is a prerelease (contains '-')
        #   - NPM_TOKEN secret is not configured (pre-launch, dry runs)
        if: ${{ !contains(github.ref, '-') && env.NODE_AUTH_TOKEN != '' }}
        run: npm publish --access public --provenance

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
