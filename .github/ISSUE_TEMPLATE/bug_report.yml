name: Bug report
description: A rule isn't compiling correctly, the dispatcher misfires, or settings.json got mangled.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: rule
    attributes:
      label: The CLAUDE.md rule that broke
      description: Paste the smallest snippet that reproduces it.
      render: markdown
      placeholder: |
        - NEVER commit `.env`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "Compiles to a never-commit hook on Bash."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Include the relevant slice of `.claude/wisp-rulecast.log` if a runtime hook misfired.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: wisp-rulecast version
      description: Output of `wisp-rulecast --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Optional. Specifically — is your CLAUDE.md doing anything unusual we should know about?
